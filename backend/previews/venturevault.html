<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENTUREVAULT - Unlock Adventures</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; }
        .header-bg { background-color: #2F4F4F; color: #B8860B; }
        .btn-primary { background-color: #B8860B; color: white; }
        .btn-primary:hover { background-color: #a0740a; }
        .input-style { border-color: #d1d5db; }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Content will be rendered here by JavaScript -->
    </div>

    <script>
        // Global state and utility functions
        let state = {
            currentUser: null, // { id, email, role: 'owner' | 'renter' }
            listings: [], // { id, ownerId, name, description, imageUrl, type, location, pricePerDay, bookings: [] }
            bookings: [], // { id, listingId, renterId, startDate, endDate, status: 'pending' | 'approved' | 'declined' | 'completed', paymentStatus: 'pending' | 'paid' }
            currentView: 'auth', // 'auth', 'dashboard', 'create-listing', 'listing-detail', 'my-bookings'
            selectedListing: null,
            selectedDates: { start: null, end: null },
            authMode: 'login' // 'login' or 'register'
        };

        // Load initial state from localStorage
        function loadState() {
            const savedListings = localStorage.getItem('venturevault_listings');
            if (savedListings) state.listings = JSON.parse(savedListings);

            const savedBookings = localStorage.getItem('venturevault_bookings');
            if (savedBookings) state.bookings = JSON.parse(savedBookings);

            const savedUser = localStorage.getItem('venturevault_currentUser');
            if (savedUser) {
                state.currentUser = JSON.parse(savedUser);
                state.currentView = 'dashboard'; // Go to dashboard if logged in
            }
        }

        function saveState() {
            localStorage.setItem('venturevault_listings', JSON.stringify(state.listings));
            localStorage.setItem('venturevault_bookings', JSON.stringify(state.bookings));
            if (state.currentUser) {
                localStorage.setItem('venturevault_currentUser', JSON.stringify(state.currentUser));
            } else {
                localStorage.removeItem('venturevault_currentUser');
            }
        }

        function uuidv4() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Helper to format dates for display
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        // --- View Rendering Functions ---

        function renderApp() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <header class="header-bg p-4 shadow-md flex justify-between items-center">
                    <h1 class="text-2xl font-bold">VENTUREVAULT</h1>
                    <nav>
                        ${state.currentUser ? `
                            <button onclick="navigate('dashboard')" class="text-white hover:text-gray-300 mx-2">Dashboard</button>
                            ${state.currentUser.role === 'owner' ? `<button onclick="navigate('create-listing')" class="text-white hover:text-gray-300 mx-2">List Gear</button>` : ''}
                            <button onclick="navigate('my-bookings')" class="text-white hover:text-gray-300 mx-2">My Bookings</button>
                            <button onclick="logout()" class="text-white hover:text-gray-300 mx-2">Logout (${state.currentUser.email})</button>
                        ` : `
                            <button onclick="setAuthMode('login')" class="text-white hover:text-gray-300 mx-2">Login</button>
                            <button onclick="setAuthMode('register')" class="text-white hover:text-gray-300 mx-2">Register</button>
                        `}
                    </nav>
                </header>
                <main class="flex-grow p-6 container mx-auto">
                    ${renderCurrentView()}
                </main>
            `;
        }

        function renderCurrentView() {
            switch (state.currentView) {
                case 'auth': return renderAuthScreen();
                case 'dashboard': return renderDashboardScreen();
                case 'create-listing': return renderCreateListingScreen();
                case 'listing-detail': return renderListingDetailScreen(state.selectedListing);
                case 'my-bookings': return renderMyBookingsScreen();
                default: return `<div>Welcome to VentureVault! Please log in or register.</div>`;
            }
        }

        function renderAuthScreen() {
            return `
                <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
                    <h2 class="text-2xl font-bold mb-6 text-center header-bg py-2 rounded">${state.authMode === 'login' ? 'Login' : 'Register'}</h2>
                    <form onsubmit="event.preventDefault(); ${state.authMode === 'login' ? 'handleLogin()' : 'handleRegister()'};">
                        <div class="mb-4">
                            <label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email:</label>
                            <input type="email" id="auth-email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" required>
                        </div>
                        <div class="mb-6">
                            <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password:</label>
                            <input type="password" id="auth-password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline input-style" required>
                        </div>
                        ${state.authMode === 'register' ? `
                            <div class="mb-4">
                                <label for="role" class="block text-gray-700 text-sm font-bold mb-2">Register As:</label>
                                <select id="auth-role" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style">
                                    <option value="renter">Renter</option>
                                    <option value="owner">Owner</option>
                                </select>
                            </div>
                        ` : ''}
                        <div class="flex items-center justify-between">
                            <button type="submit" class="btn-primary font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                                ${state.authMode === 'login' ? 'Sign In' : 'Sign Up'}
                            </button>
                            <button type="button" onclick="toggleAuthMode()" class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800">
                                ${state.authMode === 'login' ? 'Need an account? Register' : 'Already have an account? Login'}
                            </button>
                        </div>
                    </form>
                </div>
            `;
        }

        function renderDashboardScreen() {
            const filteredListings = state.listings.filter(listing => {
                const searchLocation = document.getElementById('search-location')?.value.toLowerCase() || '';
                const searchType = document.getElementById('search-type')?.value.toLowerCase() || '';
                return (listing.location.toLowerCase().includes(searchLocation) && listing.type.toLowerCase().includes(searchType));
            });

            return `
                <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">Available Gear</h2>
                <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                    <div class="flex flex-wrap -mx-2 mb-4">
                        <div class="w-full md:w-1/2 px-2 mb-4 md:mb-0">
                            <label for="search-location" class="block text-gray-700 text-sm font-bold mb-2">Location:</label>
                            <input type="text" id="search-location" onkeyup="renderApp()" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" placeholder="e.g., Denver">
                        </div>
                        <div class="w-full md:w-1/2 px-2">
                            <label for="search-type" class="block text-gray-700 text-sm font-bold mb-2">Gear Type:</label>
                            <input type="text" id="search-type" onkeyup="renderApp()" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" placeholder="e.g., Tent">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${filteredListings.length > 0 ? filteredListings.map(listing => `
                        <div class="bg-white rounded-lg shadow-md overflow-hidden">
                            <img src="${listing.imageUrl}" alt="${listing.name}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <h3 class="font-bold text-xl mb-2">${listing.name}</h3>
                                <p class="text-gray-700 text-sm mb-2">${listing.description}</p>
                                <p class="text-gray-600 text-sm mb-1"><strong>Type:</strong> ${listing.type}</p>
                                <p class="text-gray-600 text-sm mb-1"><strong>Location:</strong> ${listing.location}</p>
                                <p class="text-gray-600 text-sm mb-3"><strong>Price:</strong> $${listing.pricePerDay}/day</p>
                                <button onclick="viewListing('${listing.id}')" class="btn-primary py-2 px-4 rounded w-full">View Details</button>
                            </div>
                        </div>
                    `).join('') : '<p class="col-span-full text-center text-gray-600">No gear listings found.</p>'}
                </div>
            `;
        }

        function renderCreateListingScreen() {
            if (state.currentUser?.role !== 'owner') return '<p class="text-red-500">Access Denied: Only owners can list gear.</p>';

            return `
                <div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-md">
                    <h2 class="text-2xl font-bold mb-6 text-center header-bg py-2 rounded">List New Gear</h2>
                    <form onsubmit="event.preventDefault(); handleCreateListing();">
                        <div class="mb-4">
                            <label for="gear-name" class="block text-gray-700 text-sm font-bold mb-2">Gear Name:</label>
                            <input type="text" id="gear-name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" required>
                        </div>
                        <div class="mb-4">
                            <label for="gear-description" class="block text-gray-700 text-sm font-bold mb-2">Description:</label>
                            <textarea id="gear-description" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" rows="3" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label for="gear-image" class="block text-gray-700 text-sm font-bold mb-2">Image URL:</label>
                            <input type="url" id="gear-image" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" placeholder="https://example.com/image.jpg" required>
                        </div>
                        <div class="mb-4">
                            <label for="gear-type" class="block text-gray-700 text-sm font-bold mb-2">Type (e.g., Tent, Backpack):</label>
                            <input type="text" id="gear-type" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" required>
                        </div>
                        <div class="mb-4">
                            <label for="gear-location" class="block text-gray-700 text-sm font-bold mb-2">Location (City, State):</label>
                            <input type="text" id="gear-location" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" required>
                        </div>
                        <div class="mb-6">
                            <label for="gear-price" class="block text-gray-700 text-sm font-bold mb-2">Price Per Day ($):</label>
                            <input type="number" id="gear-price" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style" min="1" required>
                        </div>
                        <button type="submit" class="btn-primary font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">
                            Add Gear Listing
                        </button>
                    </form>
                </div>
            `;
        }

        function renderListingDetailScreen(listing) {
            if (!listing) return '<p>Listing not found.</p>';

            const owner = { email: 'owner@example.com' }; // Placeholder for owner contact

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const isDateAvailable = (date) => {
                const dateOnly = new Date(date);
                dateOnly.setHours(0,0,0,0);

                if (dateOnly < today) return false;

                const isBooked = state.bookings.some(booking => {
                    if (booking.listingId !== listing.id || booking.status === 'declined' || booking.status === 'cancelled') return false;
                    const start = new Date(booking.startDate);
                    const end = new Date(booking.endDate);
                    start.setHours(0,0,0,0);
                    end.setHours(0,0,0,0);
                    return dateOnly >= start && dateOnly <= end;
                });
                return !isBooked;
            }

            const handleDateSelect = (e) => {
                const selectedDate = e.target.value;
                if (!selectedDate) return;

                if (!state.selectedDates.start || (state.selectedDates.start && state.selectedDates.end)) {
                    state.selectedDates = { start: selectedDate, end: null };
                } else if (new Date(selectedDate) < new Date(state.selectedDates.start)) {
                    state.selectedDates = { start: selectedDate, end: state.selectedDates.start };
                } else {
                    state.selectedDates.end = selectedDate;
                }
                renderApp();
            }

            // Generate a simple calendar representation (next 30 days)
            let calendarDays = [];
            for (let i = 0; i < 30; i++) {
                const day = new Date(today);
                day.setDate(today.getDate() + i);
                calendarDays.push(day);
            }

            const getDayClasses = (date) => {
                const dateOnly = new Date(date);
                dateOnly.setHours(0,0,0,0);

                let classes = ['w-8', 'h-8', 'flex', 'items-center', 'justify-center', 'rounded-full', 'text-xs', 'font-semibold'];
                if (dateOnly < today) {
                    classes.push('bg-gray-200', 'text-gray-400');
                } else if (isDateAvailable(date)) {
                    classes.push('bg-green-100', 'text-green-800');
                    if (state.selectedDates.start && dateOnly.toDateString() === new Date(state.selectedDates.start).toDateString()) {
                        classes.push('bg-blue-500', 'text-white');
                    } else if (state.selectedDates.end && dateOnly.toDateString() === new Date(state.selectedDates.end).toDateString()) {
                        classes.push('bg-blue-500', 'text-white');
                    } else if (state.selectedDates.start && state.selectedDates.end && dateOnly > new Date(state.selectedDates.start) && dateOnly < new Date(state.selectedDates.end)) {
                        classes.push('bg-blue-200', 'text-blue-800');
                    }
                } else {
                    classes.push('bg-red-100', 'text-red-800');
                }
                return classes.join(' ');
            }

            return `
                <div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow-md">
                    <button onclick="navigate('dashboard')" class="text-blue-500 hover:underline mb-4">&larr; Back to Dashboard</button>
                    <h2 class="text-3xl font-bold mb-4 text-gray-800">${listing.name}</h2>
                    <img src="${listing.imageUrl}" alt="${listing.name}" class="w-full h-80 object-cover rounded-lg mb-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <p class="text-gray-700 text-lg mb-4">${listing.description}</p>
                            <p class="text-gray-600 mb-2"><strong>Type:</strong> ${listing.type}</p>
                            <p class="text-gray-600 mb-2"><strong>Location:</strong> ${listing.location}</p>
                            <p class="text-gray-800 text-2xl font-semibold mb-4">$${listing.pricePerDay}/day</p>
                            <p class="text-gray-500 text-sm mb-4">Owner: ${owner.email}</p>
                        </div>
                        <div>
                            <h3 class="font-bold text-xl mb-3 text-gray-800">Select Rental Dates</h3>
                            <div class="flex mb-4">
                                <div class="mr-4">
                                    <label for="start-date" class="block text-gray-700 text-sm font-bold mb-2">Start Date:</label>
                                    <input type="date" id="start-date" onchange="handleDateSelect(event)" value="${state.selectedDates.start || ''}" min="${today.toISOString().split('T')[0]}" class="shadow appearance-none border rounded py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style">
                                </div>
                                <div>
                                    <label for="end-date" class="block text-gray-700 text-sm font-bold mb-2">End Date:</label>
                                    <input type="date" id="end-date" onchange="handleDateSelect(event)" value="${state.selectedDates.end || ''}" min="${state.selectedDates.start || today.toISOString().split('T')[0]}" class="shadow appearance-none border rounded py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline input-style">
                                </div>
                            </div>
                            ${state.selectedDates.start && state.selectedDates.end ? `
                                <p class="text-green-700 font-semibold mb-4">Selected: ${formatDate(state.selectedDates.start)} to ${formatDate(state.selectedDates.end)}</p>
                                <button onclick="requestBooking('${listing.id}')" class="btn-primary py-3 px-6 rounded-lg w-full text-lg">
                                    Request to Book
                                </button>
                            ` : '<p class="text-gray-500 mb-4">Please select a start and end date.</p>'}                        

                            <h4 class="font-bold text-lg mt-6 mb-3 text-gray-800">Availability (Next 30 Days)</h4>
                            <div class="grid grid-cols-7 gap-2 text-center">
                                ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => `<div class="font-bold text-gray-500">${day}</div>`).join('')}
                                ${calendarDays.map(date => `<div class="${getDayClasses(date)}">${date.getDate()}</div>`).join('')}
                            </div>
                            <div class="flex items-center mt-4 text-sm">
                                <span class="w-4 h-4 rounded-full bg-green-100 block mr-2"></span> Available
                                <span class="w-4 h-4 rounded-full bg-red-100 block mx-2"></span> Booked
                                <span class="w-4 h-4 rounded-full bg-blue-500 block mx-2"></span> Selected
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMyBookingsScreen() {
            if (!state.currentUser) return '<p class="text-red-500">Please log in to view your bookings.</p>';

            const userBookings = state.bookings.filter(b => b.renterId === state.currentUser.id);
            const ownerListings = state.listings.filter(l => l.ownerId === state.currentUser.id);
            const ownerBookings = state.bookings.filter(b => ownerListings.some(l => l.id === b.listingId));

            return `
                <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">My Bookings & Listings</h2>

                <div class="mb-8">
                    <h3 class="text-2xl font-bold mb-4 text-gray-700">My Rental Requests (${userBookings.length})</h3>
                    ${userBookings.length > 0 ? `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${userBookings.map(booking => {
                                const listing = state.listings.find(l => l.id === booking.listingId);
                                return `
                                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                                        <p class="font-semibold text-lg">${listing ? listing.name : 'Unknown Gear'}</p>
                                        <p class="text-sm text-gray-600">${formatDate(booking.startDate)} - ${formatDate(booking.endDate)}</p>
                                        <p class="text-sm mt-2"><span class="font-bold">Status:</span> <span class="${booking.status === 'approved' ? 'text-green-600' : booking.status === 'declined' || booking.status === 'cancelled' ? 'text-red-600' : 'text-yellow-600'}">${booking.status.toUpperCase()}</span></p>
                                        <p class="text-sm"><span class="font-bold">Payment:</span> <span class="${booking.paymentStatus === 'paid' ? 'text-green-600' : 'text-red-600'}">${booking.paymentStatus.toUpperCase()}</span></p>
                                        ${booking.status === 'approved' && booking.paymentStatus === 'pending' ? `
                                            <button onclick="handlePayment('${booking.id}')" class="mt-3 btn-primary py-1 px-3 rounded text-sm">Pay Now</button>
                                        ` : ''}
                                        ${booking.status === 'approved' && booking.paymentStatus === 'paid' ? `
                                            <p class="text-sm text-green-700 mt-2">Pickup/Dropoff: Arrange directly via phone/text with owner.</p>
                                        ` : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    ` : '<p class="text-gray-600">You have no pending rental requests.</p>'}
                </div>

                ${state.currentUser.role === 'owner' ? `
                    <div>
                        <h3 class="text-2xl font-bold mb-4 text-gray-700">Booking Requests For My Gear (${ownerBookings.length})</h3>
                        ${ownerBookings.length > 0 ? `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${ownerBookings.map(booking => {
                                    const listing = state.listings.find(l => l.id === booking.listingId);
                                    const renter = { email: 'renter@example.com' }; // Placeholder for renter
                                    return `
                                        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                                            <p class="font-semibold text-lg">${listing ? listing.name : 'Unknown Gear'}</p>
                                            <p class="text-sm text-gray-600">Requested by: ${renter.email}</p>
                                            <p class="text-sm text-gray-600">${formatDate(booking.startDate)} - ${formatDate(booking.endDate)}</p>
                                            <p class="text-sm mt-2"><span class="font-bold">Status:</span> <span class="${booking.status === 'approved' ? 'text-green-600' : booking.status === 'declined' || booking.status === 'cancelled' ? 'text-red-600' : 'text-yellow-600'}">${booking.status.toUpperCase()}</span></p>
                                            ${booking.status === 'pending' ? `
                                                <div class="flex mt-3">
                                                    <button onclick="approveBooking('${booking.id}')" class="bg-green-500 hover:bg-green-600 text-white py-1 px-3 rounded text-sm mr-2">Approve</button>
                                                    <button onclick="declineBooking('${booking.id}')" class="bg-red-500 hover:bg-red-600 text-white py-1 px-3 rounded text-sm">Decline</button>
                                                </div>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : '<p class="text-gray-600">No booking requests for your gear.</p>'}
                    </div>
                ` : ''}
            `;
        }

        // --- Event Handlers and State Modifiers ---

        function setAuthMode(mode) {
            state.authMode = mode;
            renderApp();
        }

        function toggleAuthMode() {
            state.authMode = state.authMode === 'login' ? 'register' : 'login';
            renderApp();
        }

        function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            // Simple mock authentication
            if (email === 'renter@example.com' && password === 'password') {
                state.currentUser = { id: 'renter123', email: email, role: 'renter' };
                alert('Logged in as Renter!');
            } else if (email === 'owner@example.com' && password === 'password') {
                state.currentUser = { id: 'owner456', email: email, role: 'owner' };
                alert('Logged in as Owner!');
            } else {
                alert('Invalid credentials. Try renter@example.com / password or owner@example.com / password.');
                return;
            }
            state.currentView = 'dashboard';
            saveState();
            renderApp();
        }

        function handleRegister() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const role = document.getElementById('auth-role').value;

            // Simple mock registration - just log in the user directly
            state.currentUser = { id: uuidv4(), email: email, role: role };
            alert(`Registered and logged in as ${role}!`);

            state.currentView = 'dashboard';
            saveState();
            renderApp();
        }

        function logout() {
            state.currentUser = null;
            state.currentView = 'auth';
            saveState();
            renderApp();
        }

        function navigate(view, data = null) {
            state.currentView = view;
            if (view === 'listing-detail') {
                state.selectedListing = data;
                state.selectedDates = { start: null, end: null }; // Reset dates when viewing new listing
            }
            renderApp();
        }

        function handleCreateListing() {
            if (!state.currentUser || state.currentUser.role !== 'owner') {
                alert('You must be an owner to list gear.');
                return;
            }

            const name = document.getElementById('gear-name').value;
            const description = document.getElementById('gear-description').value;
            const imageUrl = document.getElementById('gear-image').value;
            const type = document.getElementById('gear-type').value;
            const location = document.getElementById('gear-location').value;
            const pricePerDay = parseFloat(document.getElementById('gear-price').value);

            if (!name || !description || !imageUrl || !type || !location || isNaN(pricePerDay)) {
                alert('Please fill in all fields correctly.');
                return;
            }

            const newListing = {
                id: uuidv4(),
                ownerId: state.currentUser.id,
                name,
                description,
                imageUrl,
                type,
                location,
                pricePerDay,
                bookings: [] // Bookings linked to this listing
            };
            state.listings.push(newListing);
            saveState();
            alert('Gear listing created successfully!');
            navigate('dashboard');
        }

        function viewListing(listingId) {
            const listing = state.listings.find(l => l.id === listingId);
            navigate('listing-detail', listing);
        }

        function requestBooking(listingId) {
            if (!state.currentUser) {
                alert('Please log in to request a booking.');
                return;
            }
            if (state.currentUser.role === 'owner') {
                alert('Owners cannot rent their own gear.');
                return;
            }

            const { start, end } = state.selectedDates;
            if (!start || !end) {
                alert('Please select both start and end dates.');
                return;
            }

            const startDate = new Date(start);
            const endDate = new Date(end);

            if (startDate > endDate) {
                alert('End date cannot be before start date.');
                return;
            }

            const listing = state.listings.find(l => l.id === listingId);
            if (!listing) {
                alert('Listing not found.');
                return;
            }

            // Simple availability check based on existing bookings
            const isAvailable = listing.bookings.every(existingBooking => {
                const existingStart = new Date(existingBooking.startDate);
                const existingEnd = new Date(existingBooking.endDate);

                // If new booking overlaps with existing approved/pending booking
                return (endDate < existingStart || startDate > existingEnd || existingBooking.status === 'declined' || existingBooking.status === 'cancelled');
            });

            if (!isAvailable) {
                alert('Selected dates are not available.');
                return;
            }

            const newBooking = {
                id: uuidv4(),
                listingId: listing.id,
                renterId: state.currentUser.id,
                ownerId: listing.ownerId,
                startDate: startDate.toISOString().split('T')[0],
                endDate: endDate.toISOString().split('T')[0],
                status: 'pending', // 'pending', 'approved', 'declined', 'completed', 'cancelled'
                paymentStatus: 'pending' // 'pending', 'paid', 'refunded'
            };

            state.bookings.push(newBooking);
            listing.bookings.push(newBooking); // Also add to listing's internal bookings
            saveState();
            alert('Rental request submitted! Owner will be notified.');
            navigate('my-bookings');
        }

        function approveBooking(bookingId) {
            const booking = state.bookings.find(b => b.id === bookingId);
            if (booking && booking.ownerId === state.currentUser.id && booking.status === 'pending') {
                booking.status = 'approved';
                saveState();
                alert('Booking approved! Renter can now proceed to payment.');
                renderApp();
            }
        }

        function declineBooking(bookingId) {
            const booking = state.bookings.find(b => b.id === bookingId);
            if (booking && booking.ownerId === state.currentUser.id && booking.status === 'pending') {
                booking.status = 'declined';
                saveState();
                alert('Booking declined.');
                renderApp();
            }
        }

        function handlePayment(bookingId) {
            const booking = state.bookings.find(b => b.id === bookingId);
            if (booking && booking.renterId === state.currentUser.id && booking.status === 'approved' && booking.paymentStatus === 'pending') {
                // Simulate Stripe payment
                const confirmed = confirm('Simulate Stripe Payment? (This is a mock payment)');
                if (confirmed) {
                    booking.paymentStatus = 'paid';
                    saveState();
                    alert('Payment successful! Your booking is confirmed. Please arrange pickup/drop-off with the owner directly via phone/text.');
                    renderApp();
                }
            } else if (!booking) {
                alert('Booking not found.');
            } else if (booking.status !== 'approved') {
                alert('Booking must be approved by owner before payment.');
            } else if (booking.paymentStatus !== 'pending') {
                alert('Payment already processed or not required.');
            }
        }

        // Initialize app
        loadState();
        renderApp();
    </script>
</body>
</html>
